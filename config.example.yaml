# go-database Konfiguration
# Kopiere diese Datei nach config/config.yaml und passe sie an.

server:
  # Host/IP on which the HTTP server listens
  host: "127.0.0.1"
  # HTTP port
  port: 8080
  # Public base URL (for behind-proxy setups)
  base_url: ""
  # Allowed CORS origin (set to "*" to allow all origins in dev)
  cors_origin: "http://localhost:5173"

auth:
  # JWT token duration (default: 60m)
  token_duration: "60m"
  # 256-bit hex-encoded secret for AES-256-GCM JWT encryption
  # Generate with: openssl rand -hex 32
  jwt_secret: ""

internal_db:
  # SQLite: path to auth database file (default: database/internal/auth.db)
  auth_path: "database/internal/auth.db"
  # PostgreSQL: connection string (overrides auth_path)
  # Example: "postgres://user:password@localhost:5432/godatabase?sslmode=disable"
  auth_url: ""
  # Path for persistent job state
  jobs_path: "database/internal/jobs.db"
  # Path for metrics storage
  metrics_path: "database/internal/metrics.db"

log_level: "info"

# Datenverzeichnis (default: database/)
data_dir: "database"

# AI Agent / MCP — LLM-Backend. API-Keys NICHT hier hart reinschreiben.
# Setze sie stattdessen via .env (gitignored) oder Env-Var GODB_MCP_API_KEY
# (koanf lädt automatisch alle GODB_* Env-Vars). Das config.yaml selbst ist
# per .gitignore ausgeschlossen — trotzdem besser den Key über Env geben.
mcp:
  enabled: false
  provider: "llamacpp"        # openrouter | lmstudio | ollama | llamacpp
  # llamacpp/ollama: lokales Modell, kein API-Key nötig.
  # model = .gguf-Dateiname (wird in ./models/ + ~/.lmstudio/models/ gesucht)
  #   oder voller Pfad. Beispiel: "DeepSeek-R1-Distill-Q4_K_M.gguf"
  model: ""                   # leer = Auto-Detection in models/; sonst GGUF-Name/Pfad
  api_key: ""                  # nur für openrouter; leer lassen → GODB_MCP_API_KEY env
  fallback_paid: false        # true = bei lokalem Fehler/Timeout zu OpenRouter (kostenpflichtig)
  llamacpp:
    auto_start: true          # llama-server.exe automatisch starten (findet binary in PATH/LM Studio)
    port: 8081
    parallel: 1                # ponytail: 1 slot = single-user; erhöhen für multi-user
