# go-database — Full Stack Deployment
# Includes: API, Sample Databases, Internal DB
#
# Preconfigured Docker deployment. Toggle AI backend + scale pods via profiles/env:
#   docker compose up                              # API + openrouter MCP (default profile)
#   GODB_MCP_PROVIDER=llamacpp docker compose up   # local .gguf models via llama-server (auto-started in container)
#   docker compose --profile llamacpp up           # explicit local-model profile
#   docker compose up --scale api=3                # 3 API pods, each with own llama-server
#   GODB_MCP_LLAMACPP_NGPU=99 docker compose up    # offload layers to GPU (needs NVIDIA toolkit, see deploy block)

services:
  api:
    build: .
    container_name: godb-api
    ports:
      - "8080:8080"
    environment:
      GODB_AUTH_JWT_SECRET: "${GODB_JWT_SECRET:-}"
      GODB_LOG_LEVEL: "info"
      GODB_MCP_ENABLED: "${GODB_MCP_ENABLED:-true}"
      GODB_MCP_API_KEY: "${GODB_MCP_API_KEY:-}"
      GODB_MCP_PROVIDER: "${GODB_MCP_PROVIDER:-llamacpp}"
      GODB_MCP_MODEL: "${GODB_MCP_MODEL:-Ornith-1.0-9B}"
      GODB_MCP_FALLBACK_PAID: "${GODB_MCP_FALLBACK_PAID:-false}"
      # llamacpp: server launches llama-server itself (config.yaml llamacpp.auto_start=true, models/ volume mounted)
      GODB_MCP_LLAMACPP_PORT: "${GODB_MCP_LLAMACPP_PORT:-8081}"
      GODB_MCP_LLAMACPP_NGPU: "${GODB_MCP_LLAMACPP_NGPU:-0}"
    volumes:
      - internal-db:/app/database/internal
      - ./models:/app/models:ro
      # mount your own config to preconfigure (overrides the image's config.yaml):
      - ./config/config.yaml:/app/config/config.yaml:ro
    # GPU/VRAM for AI pods — uncomment to expose VRAM; multiple replicas share the host GPU.
    # deploy:
    #   replicas: 3            # multiple pods, each runs its own llama-server on a slice of VRAM/RAM
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp:
    build: .
    container_name: godb-mcp
    entrypoint: ["./go-database-mcp"]
    environment:
      GODB_LOG_LEVEL: "info"
      GODB_MCP_PROVIDER: "${GODB_MCP_PROVIDER:-openrouter}"
      GODB_MCP_MODEL: "${GODB_MCP_MODEL:-free}"
      GODB_MCP_API_KEY: "${GODB_MCP_API_KEY:-}"
      GODB_MCP_FALLBACK_PAID: "${GODB_MCP_FALLBACK_PAID:-false}"
    volumes:
      - internal-db:/app/database/internal
      - ./models:/app/models
    profiles:
      - mcp
    restart: unless-stopped

  # Sample Databases
  postgres-sample:
    image: postgres:16-alpine
    container_name: godb-pg
    environment:
      POSTGRES_DB: sampledb
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - ./database/samples/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    profiles:
      - samples

  mysql-sample:
    image: mysql:8.4
    container_name: godb-mysql
    environment:
      MYSQL_DATABASE: sampledb
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - ./database/samples/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    profiles:
      - samples

  mariadb-sample:
    image: mariadb:11
    container_name: godb-maria
    environment:
      MARIADB_DATABASE: sampledb
      MARIADB_USER: dev
      MARIADB_PASSWORD: dev123
      MARIADB_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - ./database/samples/mariadb/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    profiles:
      - samples

  mongodb-sample:
    image: mongo:7
    container_name: godb-mongo
    environment:
      MONGO_INITDB_DATABASE: sampledb
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev123
    ports:
      - "27017:27017"
    profiles:
      - samples

  redis-sample:
    image: redis:7-alpine
    container_name: godb-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    profiles:
      - samples

volumes:
  internal-db:
