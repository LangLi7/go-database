name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true

env:
  GO_VERSION: '1.24'

permissions:
  contents: write
  packages: write

jobs:
  # ── Go Backend (multi-platform) ──
  backend:
    name: Go Backend (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux/amd64
            ext: ''
          - os: ubuntu-latest
            target: linux/arm64
            ext: ''
          - os: windows-latest
            target: windows/amd64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: |
          GOOS=$(echo ${{ matrix.target }} | cut -d/ -f1)
          GOARCH=$(echo ${{ matrix.target }} | cut -d/ -f2)
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
            go build -o "go-database-${{ matrix.target }}${{ matrix.ext }}" \
            ./cmd/server/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-database-${{ matrix.target }}
          path: go-database-${{ matrix.target }}${{ matrix.ext }}

  # ── Docker Image ──
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        uses: docker/buildx-action@v3
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──
  release:
    name: Create Release
    needs: [backend, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'go-database-*'
          merge-multiple: true
      - name: Generate release notes
        run: |
          echo "## go-database ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "- **Go binary (Linux amd64)**: \`go-database-linux/amd64\`" >> release-notes.md
          echo "- **Go binary (Linux arm64)**: \`go-database-linux/arm64\`" >> release-notes.md
          echo "- **Go binary (Windows)**: \`go-database-windows/amd64.exe\`" >> release-notes.md
          echo "- **Docker**: \`ghcr.io/${{ github.repository }}:latest\`" >> release-notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            go-database-*
          draft: false
          prerelease: false
