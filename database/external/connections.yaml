# go-database — Externe Datenbank-Verbindungen
#
# Hier werden alle registrierten externen DB-Connections gespeichert.
# Jede Connection kann entweder:
#   - extern:  Remote-Datenbank (Produktion, Staging, Dev-Server)
#   - docker:  Lokaler Docker-Container (Sample-DBs)
#   - file:    SQLite-Datei (lokal)
#
# Format:
#   connections:
#     - id: "meine-pg-prod"
#       type: postgres
#       source: external        # external | docker | file
#       host: "192.168.1.100"
#       port: 5432
#       database: "myapp"
#       user: "admin"
#       password: "<encrypted>"
#       ssl: true
#       tags: ["production", "wichtig"]

connections: []
